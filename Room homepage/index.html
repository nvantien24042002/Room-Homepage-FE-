<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=MuseoModerno:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Room</title>
</head>
<body>
    <header class="site-header is-open">
        <div class="site-header__inner">
            <button 
                class="site-header__hamburger 
                hidden-desktop" 
                type="button"
                aria-label="Open navigation"
                aria-expanded="false"
                aria-controls="primary-navigation"
            >
                <img src="assets/images/icon-hamburger.svg" alt="">
            </button>
            <a href="#" class="site-header__logo">
                <img src="assets/images/logo.svg" alt="">
            </a>
            <nav 
                class="site-header__nav"
                id="primary-navigation"
                aria-label="Primary navigation"
            >
                <button 
                    class="site-header__close hidden-desktop"
                    type="button"
                    aria-label="Close navigation"
                >
                    <img src="assets/images/icon-close.svg" alt="">
                </button>
                <ul class="site-header__links">
                    <li class="site-header__item">
                        <a href="#home" class="site-header__link">Home</a>
                    </li>
                    <li class="site-header__item">
                        <a href="#shop" class="site-header__link">Shop</a>
                    </li>
                    <li class="site-header__item">
                        <a href="#about" class="site-header__link">About</a>
                    </li>
                    <li class="site-header__item">
                        <a href="#contact" class="site-header__link">Contact</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
<script src="assets/js/main.js" defer></script>

</body>
</html>
