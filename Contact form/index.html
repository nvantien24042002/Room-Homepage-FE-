<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=League+Spartan:wght@100..900&family=MuseoModerno:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="variable.css">
    <link rel="stylesheet" href="style.css">
    <title>Contact Us</title>
</head>
<body>
    <main>
        <h1 class="contact-heading">
            Contact Us
        </h1>
        <form action="" id="contact-form" class="contatc-form">
            <div class="name-row">
                <div class="form-group">
                    <label for="first-name">
                        First Name <span class="required" aria-hidden="true">*</span>
                    </label>
                    <input type="text" name="first-name" id="first-name" autocomplete="given-name" aria-describedby="first-name-error">

                    <span class="error-message" id="first-name-error" aria-live="polite">
                        This field is required
                    </span>
                </div>
                <div class="form-group">
                    <label for="last-name">
                        Last Name <span class="required" aria-hidden="true">*</span>
                    </label>
                    <input
                        type="text"
                        id="last-name"
                        name="last-name"
                        autocomplete="family-name"
                        aria-describedby="last-name-error"
                        required
                    >
                    <span class="error-message" id="last-name-error" aria-live="polite">
                        This field is required
                    </span>
                </div>
            </div>
        </form>
        <div class="top-notification">
            <div>
                <img src="images/icon-success-check.svg" alt="" aria-hidden="true">
                <p class="message-sent">Message Sent!</p>
            </div>
            <p>Thanks for completing the form. We'll be in touch soon!</p>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
